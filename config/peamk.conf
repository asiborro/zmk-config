# Cosmos Lemon Wireless Configuration

# Reset settings on start (remove after flashing once)
CONFIG_ZMK_SETTINGS_RESET_ON_START=y

# External Power (for LEDs)
CONFIG_ZMK_EXT_POWER=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=15
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=180
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# Mouse keys
CONFIG_ZMK_MOUSE=y

# Bluetooth
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Pointing-friendly BLE connection prefs — ZMK's default PERIPHERAL_PREF_LATENCY=30
# stalls trackball input. Set to 0 so the host never skips connection events.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# Deep sleep (battery saving)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# USB logging (disable for production)
# CONFIG_ZMK_USB_LOGGING=y
