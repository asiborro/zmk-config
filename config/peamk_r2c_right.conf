# Right side (central) with trackball
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PMW3610=y
CONFIG_ZMK_POINTING=y

# Trackball tuning for BLE: default 250 Hz polling is too fast for BLE
# 15 ms conn interval — drop to 125 Hz and grow the mouse report queue so
# bursts don't overflow while the BT stack drains.
CONFIG_PMW3610_POLLING_RATE_125=y
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=40

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
